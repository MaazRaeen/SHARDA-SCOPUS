<div class="fixed bottom-6 right-6 z-50 font-sans"
    style="position: fixed; bottom: 24px; right: 24px; z-index: 9999; font-family: 'Inter', sans-serif;">
    <!-- Toggle Button -->
    <button (click)="toggleChat()"
        class="group flex items-center justify-center transition-all duration-300 hover:scale-110 focus:outline-none"
        style="width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #2563eb, #1d4ed8); box-shadow: 0 8px 32px rgba(37, 99, 235, 0.3); border: none; cursor: pointer;">
        <svg xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8 text-white transition-transform duration-300 group-hover:rotate-12" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" style="width: 32px; height: 32px; color: white;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
    </button>

    <!-- Chat Window -->
    <div *ngIf="isOpen"
        class="absolute bottom-20 right-0 flex flex-col overflow-hidden transition-all duration-300 origin-bottom-right"
        style="position: absolute; bottom: 84px; right: 0; width: 380px; height: 600px; background-color: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15); border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden;">

        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4"
            style="background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 20px 24px;">
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center bg-white/20 rounded-lg p-2 backdrop-blur-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" style="width: 24px; height: 24px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg leading-tight" style="margin: 0; font-size: 18px; font-weight: 700;">
                        Research AI</h3>
                    <p class="text-xs text-blue-100" style="margin: 0; font-size: 12px; opacity: 0.9;">Sharda University
                        Assistant</p>
                </div>
            </div>
            <button (click)="toggleChat()"
                class="text-white/80 hover:text-white transition-colors p-1 rounded-full hover:bg-white/10"
                style="background: none; border: none; cursor: pointer; padding: 8px;">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" style="width: 24px; height: 24px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Messages Area -->
        <div #chatMessages class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50"
            style="flex: 1; overflow-y: auto; padding: 24px; background-color: #f8fafc; scroll-behavior: smooth;">

            <div *ngFor="let msg of messages" class="flex w-full"
                [style.justify-content]="msg.sender === 'user' ? 'flex-end' : 'flex-start'"
                style="display: flex; margin-bottom: 16px;">

                <!-- Bot Avatar (Optional) -->
                <div *ngIf="msg.sender === 'bot'" class="mr-3 flex-shrink-0" style="margin-right: 12px;">
                    <div class="h-8 w-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"
                        style="width: 32px; height: 32px; border-radius: 50%; background-color: #dbeafe; display: flex; align-items: center; justify-content: center;">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"
                            style="width: 20px; height: 20px;">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm.75-11.25a.75.75 0 10-1.5 0 .75.75 0 001.5 0zm.75 2.5a.75.75 0 00-1.5 0v4a.75.75 0 001.5 0v-4z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>

                <div [class]="msg.sender === 'user' ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none shadow-md' : 'bg-white text-slate-700 rounded-2xl rounded-tl-none shadow-sm border border-slate-100'"
                    class="max-w-[80%] p-4 text-sm leading-relaxed"
                    [style.background-color]="msg.sender === 'user' ? '#2563eb' : '#ffffff'"
                    [style.color]="msg.sender === 'user' ? '#ffffff' : '#334155'"
                    [style.border-radius]="msg.sender === 'user' ? '20px 20px 4px 20px' : '20px 20px 20px 4px'"
                    [style.box-shadow]="msg.sender === 'user' ? '0 4px 12px rgba(37, 99, 235, 0.2)' : '0 2px 8px rgba(0, 0, 0, 0.04)'"
                    style="max-width: 80%; padding: 14px 18px; font-size: 14px; line-height: 1.6; word-wrap: break-word;">
                    {{ msg.text }}
                </div>
            </div>

            <div *ngIf="isLoading" class="flex justify-start animate-pulse"
                style="display: flex; justify-content: flex-start; margin-bottom: 16px;">
                <div class="bg-white rounded-2xl rounded-tl-none p-4 shadow-sm border border-slate-100 flex items-center gap-1"
                    style="background-color: white; border-radius: 20px 20px 20px 4px; padding: 16px; border: 1px solid #f1f5f9; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce"
                        style="width: 8px; height: 8px; background-color: #60a5fa; border-radius: 50%;"></div>
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce delay-100"
                        style="width: 8px; height: 8px; background-color: #60a5fa; border-radius: 50%; margin: 0 4px;">
                    </div>
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce delay-200"
                        style="width: 8px; height: 8px; background-color: #60a5fa; border-radius: 50%;"></div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-slate-100"
            style="padding: 16px; background-color: white; border-top: 1px solid #f1f5f9;">
            <div class="flex items-center gap-2 bg-slate-50 rounded-full px-4 py-2 border border-slate-200 focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 transition-all"
                style="display: flex; align-items: center; gap: 8px; background-color: #f8fafc; border-radius: 9999px; padding: 8px 16px; border: 1px solid #e2e8f0;">

                <input [(ngModel)]="userQuery" (keyup.enter)="sendMessage()" type="text"
                    placeholder="Ask about papers, authors..."
                    class="flex-1 bg-transparent border-none focus:outline-none text-sm text-slate-700 placeholder:text-slate-400"
                    style="flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: #334155;">

                <button (click)="sendMessage()" [disabled]="isLoading || !userQuery.trim()"
                    class="p-2 rounded-full bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                    style="padding: 8px; border-radius: 50%; background-color: #2563eb; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"
                        style="width: 16px; height: 16px; transform: rotate(90deg);">
                        <path
                            d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
